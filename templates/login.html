<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Co-op Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-md border border-gray-700">
        <h2 class="text-2xl font-bold text-center mb-6 text-blue-400">Welcome</h2>

        {% if error %}
        <div class="bg-red-500/20 border border-red-500 text-red-400 p-2 rounded mb-4 text-sm text-center">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm mb-1 text-gray-400">Username</label>
                <input type="text" name="username" required class="w-full bg-gray-700 border border-gray-600 rounded p-2 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm mb-1 text-gray-400">Password</label>
                <input type="password" name="password" required class="w-full bg-gray-700 border border-gray-600 rounded p-2 focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded transition">
                Login
            </button>
        </form>

        <div class="relative flex py-5 items-center">
            <div class="flex-grow border-t border-gray-700"></div>
            <span class="flex-shrink mx-4 text-gray-500 text-sm">OR</span>
            <div class="flex-grow border-t border-gray-700"></div>
        </div>

        <a href="/login/google" class="w-full flex items-center justify-center gap-3 bg-white text-gray-900 font-semibold py-2 rounded hover:bg-gray-100 transition">
            <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5 h-5">
            Continue with Google
        </a>

        <p class="text-center text-sm text-gray-500 mt-6">
            Don't have an account? <a href="/register" class="text-blue-400 hover:underline">Register</a>
        </p>

    </div>
</body>
</html>
